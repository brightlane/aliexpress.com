<!-- EXIT POPUP -->
<div id="exit-popup" style="display:none;">
    <p>⚡ Wait! Only <strong id="stock-count">3</strong> lanterns left!</p>
    <p>Grab your <strong>1000 Lumen Lantern</strong> before it’s gone!</p>
    <button id="buy-now-btn">Get It Now</button>
    <p id="countdown-text">Offer expires in <span id="countdown">10</span> seconds!</p>
</div>

<style>
#exit-popup {
    position: fixed;
    bottom: -400px; /* start hidden below screen */
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    max-width: 90%;
    background: #ff6b6b;
    color: #fff;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
    font-size: 18px;
    z-index: 9999;
    transition: bottom 0.8s ease;
}
#exit-popup button {
    margin-top: 15px;
    padding: 12px 30px;
    font-size: 20px;
    border: none;
    border-radius: 50px;
    background: #fff;
    color: #ff6b6b;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}
#exit-popup button:hover {
    background: #ffe0e0;
}
</style>

<script>
// Exit intent with slide-in
let exitShown = false;
document.addEventListener('mouseout', function(e){
    if (!e.toElement && !e.relatedTarget && e.clientY < 50 && !exitShown) {
        exitShown = true;
        const popup = document.getElementById('exit-popup');
        popup.style.display = 'block';
        setTimeout(() => popup.style.bottom = '50px', 50); // slide in
        startCountdown();
    }
});

// Countdown for urgency
function startCountdown() {
    let timeLeft = 10;
    const countdownEl = document.getElementById('countdown');
    const btn = document.getElementById('buy-now-btn');
    const stockEl = document.getElementById('stock-count');
    const interval = setInterval(() => {
        if(timeLeft <= 0) {
            clearInterval(interval);
            countdownEl.textContent = "0";
            stockEl.textContent = "0";
            btn.textContent = "Sold Out!";
            btn.disabled = true;
        } else {
            countdownEl.textContent = timeLeft;
        }
        timeLeft--;
    }, 1000);
}

// Button click goes to affiliate link
document.getElementById('buy-now-btn').addEventListener('click', () => {
    window.location.href = 'https://tidd.ly/4slUGYv';
});
</script>
