<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Audit Directory | SoftLife Travel Network</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        a { color: #1e90ff; text-decoration: none; font-size: 14px; border-bottom: 1px solid #eee; display: block; padding: 5px; }
        a:hover { background: #f1f2f6; }
        h1 { border-bottom: 2px solid #2f3542; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Product Audit Index (500+ Items)</h1>
    <p>This directory contains the full 2026 technical reliability reports for the SoftLife Travel Network.</p>
    
    <div id="link-mesh" class="grid">
        </div>

    <script>
        // Use the SAME list of slugs you have in your index.html
        const slugs = [
            "100w-solar-panel", "poco-f7-phone", "magsafe-powerbank", 
            "plasma-arc-lighter-pro", "bone-conduction-swim", "ai-smart-desk-lamp"
            // PASTE ALL 500 SLUGS HERE
        ];

        const container = document.getElementById('link-mesh');
        
        slugs.forEach(slug => {
            const a = document.createElement('a');
            // This points back to your main index.html with the parameter
            a.href = `index.html?item=${slug}`;
            // This prettifies the slug for the link text
            a.innerText = slug.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            container.appendChild(a);
        });
    </script>
</body>
</html>
