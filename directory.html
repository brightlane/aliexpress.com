<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Audit Directory | SoftLife Travel Network</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 900px; margin: 40px auto; padding: 20px; color: #333; background: #fff; }
        h1 { border-bottom: 3px solid #ff4757; padding-bottom: 10px; color: #2f3542; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 30px; }
        .audit-link { 
            display: block; padding: 15px; background: #f8f9fa; border: 1px solid #dee2e6; 
            border-radius: 8px; text-decoration: none; color: #007bff; font-weight: bold; text-align: center;
        }
        .audit-link:hover { background: #e2e6ea; color: #0056b3; border-color: #adb5bd; }
        footer { margin-top: 50px; text-align: center; color: #6c757d; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>Product Audit Directory</h1>
    <p>Select a verified technical report from the SoftLife network below:</p>
    
    <div id="master-grid" class="grid">
        </div>

    <footer>
        <p>© 2026 SoftLife Travel Network | <a href="index.html">Home</a></p>
    </footer>

    <script>
        // MUST match the keys in your index.html portalDatabase exactly
        const slugs = [
            "100w-solar-panel",
            "poco-f7-phone",
            "tessan-65w",
            "magsafe-powerbank",
            "plasma-arc-lighter-pro",
            "bone-conduction-swim",
            "ai-smart-desk-lamp",
            "emergency-water-filter"
        ];

        const container = document.getElementById('master-grid');
        
        slugs.forEach(slug => {
            const a = document.createElement('a');
            // We use './' to ensure it stays in the same folder
            a.href = `./index.html?item=${slug}`;
            a.className = 'audit-link';
            
            // Format the text nicely
            const label = slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            a.innerText = "🔍 " + label;
            
            container.appendChild(a);
        });
    </script>
</body>
</html>
