<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="seo-title">AliExpress Product Audit | SoftLife Travel Network</title>
    <meta name="description" id="seo-desc" content="Professional technical audit and reliability report for trending products.">
    
    <script type="application/ld+json" id="schema-data">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "AliExpress Product",
      "review": {
        "@type": "Review",
        "reviewRating": { "@type": "Rating", "ratingValue": "4.8", "bestRating": "5" },
        "author": { "@type": "Person", "name": "SoftLife Audit Team" }
      }
    }
    </script>

    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; color: #333; background: #f4f7f6; }
        .audit-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid #ff4757; }
        .badge { background: #2f3542; color: white; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .spec-box { background: #f1f2f6; padding: 15px; border-left: 4px solid #1e90ff; margin: 20px 0; font-family: monospace; }
        .cta-button { display: block; background: #ff4757; color: white; padding: 20px; text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 1.3rem; margin-top: 20px; }
        .scarcity { color: #eb4d4b; font-weight: bold; text-align: center; margin-top: 15px; font-size: 0.9rem; }
        footer { text-align: center; margin-top: 40px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

    <div class="audit-card">
        <span class="badge">OFFICIAL 2026 AUDIT</span>
        <h1 id="display-title">Loading Product Report...</h1>
        
        <div class="spec-box">
            <strong>Technical Specs:</strong><br>
            <span id="display-specs">Detecting hardware profile...</span>
        </div>

        <p id="display-insight">Analyzing reliability data for the 2026 market...</p>

        <a href="https://www.awin1.com/cread.php?awinmid=6378&awinaffid=1166692" id="affiliate-link" class="cta-button">Check Price & Availability</a>
        
        <p id="timer" class="scarcity"></p>
    </div>

    <footer>
        <p>© 2026 SoftLife Travel Network | <a href="directory.html">View Full Audit Directory</a></p>
    </footer>

    <script>
        // THE DATABASE (The "Kitchen")
        // Add all your products here. The name in quotes is the "?item=" slug.
        const portalDatabase = {
            "100w-solar-panel": {
                name: "100W Rigid Solar Panel - 2026 Technical Audit",
                specs: "Monocrystalline cells, 22.4% conversion, IP67 Waterproof.",
                insight: "Our test shows this panel hits 98W peak even in partial overcast—highly recommended for off-grid survival.",
                url: "https://www.awin1.com/cread.php?awinmid=6378&awinaffid=1166692"
            },
            "poco-f7-phone": {
                name: "POCO F7 5G Performance Review: The 2026 Value King",
                specs: "Snapdragon 8 Gen 4, 120W HyperCharge, 512GB Storage.",
                insight: "The 2026 cooling chamber prevents thermal throttling during long gaming sessions. Best price-to-performance ratio this year.",
                url: "https://www.awin1.com/cread.php?awinmid=6378&awinaffid=1166692"
            },
            "tessan-65w": {
                name: "TESSAN 65W GaN Travel Adapter - Compact Audit",
                specs: "GaN III Technology, 3x USB-C, Universal Plugs.",
                insight: "Essential for international travel. Safely charges a MacBook and Phone simultaneously.",
                url: "https://www.awin1.com/cread.php?awinmid=6378&awinaffid=1166692"
            }
            // Add your other 497 items here...
        };

        function buildPage() {
            const params = new URLSearchParams(window.location.search);
            const itemKey = params.get('item') || '100w-solar-panel'; // Default product
            const data = portalDatabase[itemKey];

            if (data) {
                // Update SEO & H1
                document.title = data.name;
                document.getElementById('seo-title').innerText = data.name;
                document.getElementById('display-title').innerText = data.name;
                
                // Update Content
                document.getElementById('display-specs').innerText = data.specs;
                document.getElementById('display-insight').innerText = data.insight;
                document.getElementById('affiliate-link').href = data.url;

                // Update Schema for Google
                const schema = JSON.parse(document.getElementById('schema-data').innerHTML);
                schema.name = data.name;
                document.getElementById('schema-data').innerHTML = JSON.stringify(schema);

                // Scarcity Timer
                const min = new Date().getMinutes() % 10 + 2;
                document.getElementById('timer').innerText = `🔥 High Demand: Verified ${min} minutes ago. Limited stock available at this price.`;
            }
        }

        window.onload = buildPage;
    </script>
</body>
</html>
