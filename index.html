<script>
    // 1. THE DATABASE: Every slug here must match what you put in the URL
    const portalDatabase = {
        "solar-panel-100w": {
            title: "100W Rigid Solar Panel - 2026 Efficiency Audit",
            specs: "Monocrystalline cells, 22.4% conversion rate, IP67 Waterproof.",
            insight: "Our audit confirms these cells maintain peak output even in low-light conditions.",
            social: "Ranked #1 for Off-Grid Survival Gear 2026.",
            url: "https://www.awin1.com/cread.php?awinmid=6378&awinaffid=1166692"
        },
        "poco-f7-phone": {
            title: "POCO F7 Performance Review: The 2026 Value King",
            specs: "Snapdragon 8 Gen 4, 120W Fast Charge, 5000mAh Battery.",
            insight: "Thermal management is significantly improved over the F6 models.",
            social: "Over 10,000+ units shipped to the EU this month.",
            url: "https://www.awin1.com/cread.php?awinmid=6378&awinaffid=1166692"
        }
        // ADD MORE SLUGS HERE
    };

    // 2. THE LOGIC: This "figures out" what ?item= equals
    function renderPage() {
        const params = new URLSearchParams(window.location.search);
        const itemSlug = params.get('item'); // This grabs the text after ?item=
        const data = portalDatabase[itemSlug];

        if (data) {
            // Update the SEO Title and Content
            document.title = data.title;
            document.getElementById('prod-name').innerText = data.title;
            document.getElementById('prod-specs').innerText = data.specs;
            document.getElementById('prod-insight').innerText = data.insight;
            document.getElementById('main-link').href = data.url;
        } else {
            // Fallback if the slug is missing
            document.getElementById('prod-name').innerText = "Select a Product Audit";
        }
    }

    window.onload = renderPage;
</script>
